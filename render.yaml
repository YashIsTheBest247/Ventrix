# Optional Render Blueprint — deploy the backend (and a free Postgres) in one go.
# In Render: New → Blueprint → pick this repo. Or configure a Web Service manually
# with the same Root Directory / build / start values.
services:
  - type: web
    name: ventrix-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.5"
      - key: DATABASE_URL
        fromDatabase:
          name: ventrix-db
          property: connectionString
      # Set this to your Vercel URL after the frontend is deployed:
      - key: CORS_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false
      # Gmail (optional, web OAuth) — paste the OAuth *Web* client JSON and set
      # the callback to https://<this-service>.onrender.com/api/gmail/callback
      - key: GOOGLE_CLIENT_SECRET_JSON
        sync: false
      - key: GMAIL_REDIRECT_URI
        sync: false
      # AI analyzer (optional, free):
      - key: GEMINI_API_KEY
        sync: false

databases:
  - name: ventrix-db
    plan: free
